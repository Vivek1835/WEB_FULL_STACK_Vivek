<!DOCTYPE html>
<html lang="en">
<!-- ===================================================================
     LIBRARY PAGE - Shows user's game collection
     =================================================================== -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library - Ironvow Shop</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="Game store logo.svg" type="image/svg+xml">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">
                <img src="Game store logo.svg" alt="Ironvow Shop Logo" class="img">
                <h2>Ironvow Shop</h2>
            </div>
            <ul class="nav-links">
                <li><a href="home.html">Home</a></li>
                <li><a href="products.html">Offer/Sale</a></li>
                <li><a href="cart.html">Cart</a></li>
                <li><a href="news.html">News</a></li>
                <li><a href="library.html" class="active">Library</a></li>
                <li><a href="myside.html">My Side</a></li>
                <li id="login-nav-item"><a href="index.html">Login</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="library-section">
            <!-- Library page header -->
            <h2 class="library-page-header">My Library</h2>

            <!-- Show this if not logged in -->
            <div id="not-logged-in" style="display:none; text-align:center; padding:4rem;">
                <p style="color: var(--text-secondary); font-size:1.2rem; margin-bottom:1rem;">Please login to see your library!</p>
                <a href="index.html" class="btn">Login / Register</a>
            </div>

            <!-- Show this if logged in -->
            <div id="library-content" style="display:none;">
                <div class="library-layout">

                    <!-- LEFT SIDE: Game list -->
                    <div class="library-games-grid" id="library-games-grid">
                        <!-- Filled by JavaScript from database -->
                    </div>

                    <!-- RIGHT SIDE: Selected game details -->
                    <div class="library-detail-panel">
                        <div class="detail-header">
                            <h3 id="detail-title">Select a game</h3>
                        </div>
                        <div class="detail-content" id="detail-content">
                            <!-- Game image -->
                            <img id="detail-image" src="" alt="" style="width:100%; border-radius:8px; margin-bottom:1rem; display:none;">
                            <!-- Game details -->
                            <p id="detail-genre" style="display:none;"><strong>Genre:</strong> <span></span></p>
                            <p id="detail-price" style="display:none;"><strong>Price:</strong> <span></span></p>
                            <p style="color: var(--text-secondary); font-size:0.9rem;" id="detail-placeholder">Click a game on the left to see details.</p>
                            <!-- Open on Steam button -->
                            <a id="detail-steam-btn" href="#" target="_blank" class="btn" style="display:none; margin-top:1rem; text-align:center;">
                                Open on Steam
                            </a>
                        </div>
                    </div>

                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Ironvow Shop. All rights reserved.</p>
    </footer>

    <!-- SCRIPT: Loads user's favourite games as their library -->
    <script>
        // Check session first
        fetch('/api/session')
            .then(res => res.json())
            .then(data => {
                if (data.loggedIn) {
                    // Hide login nav item
                    const loginItem = document.getElementById('login-nav-item');
                    if (loginItem) loginItem.style.display = 'none';
                    // Show library content
                    document.getElementById('library-content').style.display = 'block';
                    loadLibrary();
                } else {
                    document.getElementById('not-logged-in').style.display = 'block';
                }
            });

        // Load user's favourited games as library
        function loadLibrary() {
            fetch('/api/favourites/full')
                .then(res => res.json())
                .then(games => {
                    const grid = document.getElementById('library-games-grid');

                    if (!Array.isArray(games) || games.length === 0) {
                        grid.innerHTML = `
                            <div style="color: var(--text-secondary); padding:1rem;">
                                <p>Your library is empty!</p>
                                <p style="font-size:0.9rem; margin-top:0.5rem;">Heart games on the home page to add them to your library.</p>
                                <a href="home.html" class="btn" style="display:inline-block; margin-top:1rem;">Browse Games</a>
                            </div>`;
                        return;
                    }

                    grid.innerHTML = '';
                    // Build a box for each game
                    games.forEach(game => {
                        const box = document.createElement('div');
                        box.className = 'library-game-box';
                        box.style.cursor = 'pointer';
                        box.style.padding = '0';
                        box.style.overflow = 'hidden';
                        box.style.position = 'relative';
                        box.onclick = () => showGameDetails(game);
                        box.innerHTML = `
                            <!-- Game cover image -->
                            <img src="${game.image_url}" alt="${game.title}" style="width:100%; height:100%; object-fit:cover; border-radius:4px;">
                            <!-- Game title overlay at bottom -->
                            <div style="
                                position:absolute;
                                bottom:0;
                                left:0;
                                right:0;
                                background: rgba(0,0,0,0.7);
                                padding:0.4rem 0.6rem;
                            ">
                                <div class="game-label">${game.title}</div>
                            </div>
                        `;
                        grid.appendChild(box);
                    });
                });
        }

        // Show game details on the right panel when clicked
        function showGameDetails(game) {
            // Update detail panel with selected game info
            document.getElementById('detail-title').textContent = game.title;
            document.getElementById('detail-placeholder').style.display = 'none';

            // Show game image
            const img = document.getElementById('detail-image');
            img.src = game.image_url;
            img.alt = game.title;
            img.style.display = 'block';

            // Show genre
            const genreEl = document.getElementById('detail-genre');
            genreEl.style.display = 'block';
            genreEl.querySelector('span').textContent = game.genre || 'N/A';

            // Show price
            const priceEl = document.getElementById('detail-price');
            priceEl.style.display = 'block';
            priceEl.querySelector('span').textContent = game.price == 0 ? 'FREE' : '$' + parseFloat(game.price).toFixed(2);

            // Show Steam button
            const steamBtn = document.getElementById('detail-steam-btn');
            steamBtn.href = game.steam_url;
            steamBtn.style.display = 'block';
        }
    </script>
</body>
</html>
