<!DOCTYPE html>
<html lang="en">
<!-- ===================================================================
     LIBRARY PAGE - Shows user's game collection
     =================================================================== -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library - Ironvow Shop</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="Game store logo.svg" type="image/svg+xml">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">
                <img src="Game store logo.svg" alt="Ironvow Shop Logo" class="img">
                <h2>Ironvow Shop</h2>
            </div>
            <ul class="nav-links">
                <li><a href="home.html">Home</a></li>
                <li><a href="products.html">Offer/Sale</a></li>
                <li><a href="cart.html">Cart</a></li>
                <li><a href="news.html">News</a></li>
                <li><a href="library.html" class="active">Library</a></li>
                <li><a href="myside.html">My Side</a></li>
                <li id="login-nav-item"><a href="index.html">Login</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="library-section">
            <!-- Library page header -->
            <h2 class="library-page-header">My Library</h2>

            <!-- Show this if not logged in -->
            <div id="not-logged-in" style="display:none; text-align:center; padding:4rem;">
                <p style="color: var(--text-secondary); font-size:1.2rem; margin-bottom:1rem;">Please login to see your library!</p>
                <a href="index.html" class="btn">Login / Register</a>
            </div>

            <!-- Show this if logged in -->
            <div id="library-content" style="display:none;">
                <div class="library-layout">

                    <!-- LEFT SIDE: Game list -->
                    <div class="library-games-grid" id="library-games-grid">
                        <!-- Filled by JavaScript from database -->
                    </div>

                    <!-- RIGHT SIDE: Selected game details -->
                    <div class="library-detail-panel">
                        <div class="detail-header">
                            <h3 id="detail-title">Select a game</h3>
                        </div>
                        <div class="detail-content" id="detail-content">
                            <!-- Game image -->
                            <img id="detail-image" src="" alt="" style="width:100%; border-radius:8px; margin-bottom:1rem; display:none;">
                            <!-- Game details -->
                            <p id="detail-genre" style="display:none;"><strong>Genre:</strong> <span></span></p>
                            <p id="detail-price" style="display:none;"><strong>Price:</strong> <span></span></p>
                            <p style="color: var(--text-secondary); font-size:0.9rem;" id="detail-placeholder">Click a game on the left to see details.</p>
                            <!-- Open on Steam button -->
                            <a id="detail-steam-btn" href="#" target="_blank" class="btn" style="display:none; margin-top:1rem; text-align:center;">
                                Open on Steam
                            </a>
                        </div>
                    </div>

                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Ironvow Shop. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
