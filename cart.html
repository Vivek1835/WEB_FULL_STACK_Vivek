<!DOCTYPE html>
<html lang="en">
<!-- ===================================================================
     CART PAGE
     =================================================================== -->
<head>
    <!-- Meta tags for character encoding and viewport settings -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart - Ironvow Shop</title>
    <!-- Link to main stylesheet -->
    <link rel="stylesheet" href="style.css">
    <!-- Custom favicon for the browser tab -->
    <link rel="icon" href="Game store logo.svg" type="image/svg+xml">
</head>
<body>
    <!-- HEADER: Navigation bar with logo and main menu links -->
    <header>
        <!-- Navigation bar with logo and links -->
        <nav class="navbar">
            <!-- Logo section with shop icon and name -->
            <div class="logo">
                <!-- Shop logo image -->
                <img src="Game store logo.svg" alt="Ironvow Shop Logo" class="img">
                <!-- Shop name/title -->
                <h2>Ironvow Shop</h2>
            </div>
            <!-- Main navigation links -->
            <ul class="nav-links">
                <li><a href="home.html">Home</a></li>
                <li><a href="products.html">Offer/Sale</a></li>
                <li><a href="cart.html" class="active">Cart</a></li>
                <li><a href="news.html">News</a></li>
                <li><a href="library.html">Library</a></li>
                <li><a href="myside.html">My Side</a></li>
                <li id="login-nav-item"><a href="index.html">Login</a></li>
            </ul>
        </nav>
    </header>

    <!-- MAIN CONTENT: Shopping cart with items and checkout -->
    <main>
        <!-- Cart section container -->
        <section class="cart-section">
            <!-- Cart page header -->
            <h2 class="cart-header">Your Cart</h2>

            <!-- Cart layout: items on left, billing on right -->
            <div class="cart-layout">

                <!-- LEFT SIDE: List of games in cart -->
                <div class="cart-list-side">
                    <!-- Game list loaded from database by JavaScript -->
                    <div class="game-list" id="cart-game-list">
                        <!-- Loading message shown while fetching from database -->
                        <p style="color: var(--text-secondary);">Loading your cart...</p>
                    </div>
                </div>

                <!-- RIGHT SIDE: Price summary and checkout -->
                <div class="cart-total-side">
                    <div class="description-box">
                        <!-- Subtotal calculated from database cart items -->
                        <p><strong>Subtotal:</strong> $<span id="subtotal">0.00</span></p>
                        <p><strong>Tax (8%):</strong> $<span id="tax">0.00</span></p>
                        <p><strong>Shipping:</strong> Free</p>
                        <p style="border-top: 1px solid var(--accent-primary); padding-top: 0.8rem; margin-top: 0.8rem;"></p>
                    </div>
                    <!-- Total box showing final amount -->
                    <div class="total-box">
                        <p><strong>TOTAL: $<span id="grand-total">0.00</span></strong></p>
                    </div>
                    <!-- Checkout button -->
                    <button id="checkout-btn" class="btn" style="width:100%; margin-top:1rem;">
                        Checkout
                    </button>
                </div>
            </div>
        </section>
    </main>

    <!-- FOOTER: Copyright and site information -->
    <footer>
        <!-- Copyright notice -->
        <p>&copy; 2026 Ironvow Shop. All rights reserved.</p>
    </footer>

    <!-- SCRIPT: Loads cart items from database and calculates totals -->
    <script>
        // Fetch cart items from database for logged in user
        fetch('/api/cart/items')
            .then(res => res.json())
            .then(data => {
                const cartList = document.getElementById('cart-game-list');

                // If user is not logged in show message
                if (data.message === 'not logged in') {
                    cartList.innerHTML = '<p style="color: var(--text-secondary);">Please <a href="index.html" style="color: var(--accent-primary);">login</a> to see your cart!</p>';
                    return;
                }

                // If cart is empty show message
                if (data.length === 0) {
                    cartList.innerHTML = '<p style="color: var(--text-secondary);">Your cart is empty! <a href="home.html" style="color: var(--accent-primary);">Browse games</a></p>';
                    return;
                }

                // Clear loading message
                cartList.innerHTML = '';
                let subtotal = 0;

                // Loop through each cart item and build a row
                data.forEach(item => {
                    subtotal += parseFloat(item.price);

                    const row = document.createElement('div');
                    row.className = 'game-item';
                    row.style.display = 'flex';
                    row.style.justifyContent = 'space-between';
                    row.style.alignItems = 'center';
                    row.innerHTML = `
                        <!-- Game title and price -->
                        <span>${item.title} - $${parseFloat(item.price).toFixed(2)}</span>
                        <!-- Remove button to delete from cart -->
                        <button onclick="removeFromCart(${item.game_id})" style="background:none; border:none; color:var(--accent-primary); cursor:pointer; font-size:18px;" title="Remove from cart">✕</button>
                    `;
                    cartList.appendChild(row);
                });

                // Calculate tax and total
                const tax = subtotal * 0.08;
                const grandTotal = subtotal + tax;

                // Update price display
                document.getElementById('subtotal').textContent = subtotal.toFixed(2);
                document.getElementById('tax').textContent = tax.toFixed(2);
                document.getElementById('grand-total').textContent = grandTotal.toFixed(2);
            });

        // Remove a game from the cart
        function removeFromCart(gameId) {
            fetch('/api/cart/remove', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ gameId })
            })
            .then(res => res.json())
            .then(data => {
                if (data.message === 'removed') {
                    // Reload page to refresh cart
                    location.reload();
                }
            });
        }

        // Checkout button
        document.getElementById('checkout-btn').addEventListener('click', () => {
            alert('Checkout coming soon!');
        });
    </script>
    <!-- Hide login link if user is already logged in -->
<script>
    fetch('/api/session')
        .then(res => res.json())
        .then(data => {
            if (data.loggedIn) {
                const loginItem = document.getElementById('login-nav-item');
                if (loginItem) loginItem.style.display = 'none';
            }
        });
</script>
</body>
</html>
