<!DOCTYPE html>
<html lang="en">
<!-- ===================================================================
     HOME PAGE 
     =================================================================== -->
<head>
    <!-- Meta tags for character encoding and viewport settings -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ironvow Shop - Home</title>
    <!-- Link to main stylesheet -->
    <link rel="stylesheet" href="style.css">
    <!-- Custom favicon for the browser tab -->
    <link rel="icon" href="Game store logo.svg" type="image/svg+xml">
</head>
<body>
    <!-- HEADER: Navigation bar with logo and main menu links -->
    <header>
        <!-- Navigation bar with logo and links -->
        <nav class="navbar">
            <!-- Logo section with shop icon and name -->
            <div class="logo">
                <!-- Shop logo image -->
                <img src="Game store logo.svg" alt="Ironvow Shop Logo" class="img">
                <!-- Shop name/title -->
                <h2>Ironvow Shop</h2>
            </div>
            <!-- Main navigation links -->
            <ul class="nav-links">
                <li><a href="home.html" class="active">Home</a></li>
                <li><a href="products.html">Offer/Sale</a></li>
                <li><a href="cart.html">Cart</a></li>
                <li><a href="news.html">News</a></li>
                <li><a href="library.html">Library</a></li>
                <li><a href="index.html">My Side</a></li>
                <li><a href="index.html">Login</a></li>
            </ul>
        </nav>
    </header>

    <!-- MAIN CONTENT: Homepage content with game showcase sections -->
    <main>
        <!-- Home section container displaying trending and free games -->
        <section class="home-section">
            <!-- Header area with shop title and Steam logo branding -->
            <div class="home-header">
                <!-- Shop title with gradient styling -->
                <h2 class="shop-title">Ironvow Shop</h2>
                <!-- Steam logo image -->
                <img src="steam.svg" alt="Steam Logo" style="height: 80px; width: auto;">
            </div>

            <!-- TRENDING GAMES SECTION: Loaded dynamically from MySQL database -->
            <!-- Only games with price greater than 0 will appear here -->
            <div class="section-label">TRENDING GAMES</div>
            <!-- Empty grid - JavaScript fills this with paid game cards from database -->
            <div class="sale-grid" id="trending-grid"></div>

            <!-- TOP FREE GAMES SECTION: Loaded dynamically from MySQL database -->
            <!-- Only games with price equal to 0 will appear here -->
            <div class="section-label">TOP FREE GAMES</div>
            <!-- Empty grid - JavaScript fills this with free game cards from database -->
            <div class="sale-grid" id="free-grid"></div>

        </section>
    </main>

    <!-- FOOTER: Copyright and site information -->
    <footer>
        <!-- Copyright notice -->
        <p>&copy; 2026 Ironvow Shop. All rights reserved.</p>
    </footer>

    <!-- SCRIPT: Fetches games from database and builds cards with image, favourite and cart buttons -->
    <script>
        // Fetch all games from the /api/games route in server.js
        fetch('/api/games')
            .then(res => res.json())
            .then(games => {
                // Get both grid containers
                const trendingGrid = document.getElementById('trending-grid');
                const freeGrid = document.getElementById('free-grid');

                // Loop through every game returned from the database
                games.forEach(game => {
                    // Build a game card using CSS classes from style.css
                    const card = `
                        <div class="sale-item" onclick="window.open('${game.steam_url}', '_blank')">
                            <!-- Real game cover image loaded from Steam CDN -->
                            <img class="game-img" src="${game.image_url}" alt="${game.title}">
                            <!-- Game title from database -->
                            <p class="game-name">${game.title}</p>
                            <!-- Show FREE if price is 0, otherwise show dollar amount -->
                            <p class="sale-price">${game.price == 0 ? 'FREE' : '$' + game.price}</p>
                            <!-- Action buttons row using card-buttons class -->
                            <div class="card-buttons">
                                <!-- Heart button - toggles favourite and saves to user account in database -->
                                <button class="fav-btn" onclick="toggleFavourite(event, ${game.id})" title="Add to favourites">🩷</button>
                                <!-- Cart button - adds game to cart and saves to user account in database -->
                                <button class="cart-btn" onclick="addToCart(event, ${game.id})" title="Add to cart">🛒</button>
                            </div>
                        </div>`;

                    // Sort card into correct grid based on price
                    if (game.price == 0) {
                        freeGrid.innerHTML += card;     // Free games go to free grid
                    } else {
                        trendingGrid.innerHTML += card; // Paid games go to trending grid
                    }
                });
            });

        // Toggle favourite on or off for a game
        function toggleFavourite(event, gameId) {
            event.stopPropagation(); // Prevent card click opening Steam page
            fetch('/api/favourite', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ gameId })
            })
            .then(res => res.json())
            .then(data => {
                if (data.message === 'not logged in') {
                    alert('Please login to add favourites!');
                } else {
                    // Switch between filled and empty heart icon
                    event.target.innerHTML = data.message === 'added' ? '🩷' : '🤍';
                }
            });
        }

        // Add a game to the cart
        function addToCart(event, gameId) {
            event.stopPropagation(); // Prevent card click opening Steam page
            fetch('/api/cart', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ gameId })
            })
            .then(res => res.json())
            .then(data => {
                if (data.message === 'not logged in') {
                    alert('Please login to add to cart!');
                } else if (data.message === 'already in cart') {
                    alert('Already in your cart!');
                } else {
                    alert('Added to cart!');
                }
            });
        }
    </script>
</body>
</html>
