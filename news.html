<!DOCTYPE html>
<html lang="en">
<!-- ===================================================================
     NEWS PAGE - Real gaming news loaded from NewsAPI
     =================================================================== -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News - Ironvow Shop</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="Game store logo.svg" type="image/svg+xml">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">
                <img src="Game store logo.svg" alt="Ironvow Shop Logo" class="img">
                <h2>Ironvow Shop</h2>
            </div>
            <ul class="nav-links">
                <li><a href="home.html">Home</a></li>
                <li><a href="products.html">Offer/Sale</a></li>
                <li><a href="cart.html">Cart</a></li>
                <li><a href="news.html" class="active">News</a></li>
                <li><a href="library.html">Library</a></li>
                <li><a href="myside.html">My Side</a></li>
                <li id="login-nav-item"><a href="index.html">Login</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="news-section">
            <h2 class="news-page-header">Latest Gaming News</h2>

            <!-- News grid - filled by JavaScript with real articles -->
            <div class="news-boxes-grid" id="news-grid">
                <!-- Loading message shown while fetching news -->
                <p style="color: var(--text-secondary);">Loading news...</p>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Ironvow Shop. All rights reserved.</p>
    </footer>

    <!-- SCRIPT: Fetches real gaming news from NewsAPI -->
    <script>
        // Fetch real gaming news from NewsAPI
        fetch('/api/news')
            .then(res => res.json())
            .then(articles => {
                const grid = document.getElementById('news-grid');
                grid.innerHTML = '';

                if (!articles || articles.length === 0) {
                    grid.innerHTML = '<p style="color: var(--text-secondary);">No news available right now.</p>';
                    return;
                }

                // Loop through each article and build a news card
                articles.forEach(article => {
                    const item = document.createElement('div');
                    item.className = 'news-item';
                    item.style.cursor = 'pointer';
                    item.onclick = () => window.open(article.url, '_blank');

                    // Use article image or fallback to placeholder
                    const img = article.urlToImage
                        ? `<img src="${article.urlToImage}" alt="${article.title}" style="width:100%; height:120px; object-fit:cover; border-radius:8px; margin-bottom:0.8rem;">`
                        : `<div class="news-box"></div>`;

                    item.innerHTML = `
                        ${img}
                        <p class="news-description">${article.title}</p>
                        <p style="color: var(--text-secondary); font-size: 0.75rem; margin-top: 0.3rem;">
                            ${article.source.name} · ${new Date(article.publishedAt).toLocaleDateString()}
                        </p>
                    `;
                    grid.appendChild(item);
                });
            });

        // Hide login if logged in
        fetch('/api/session')
            .then(res => res.json())
            .then(data => {
                if (data.loggedIn) {
                    const loginItem = document.getElementById('login-nav-item');
                    if (loginItem) loginItem.style.display = 'none';
                }
            });
    </script>
</body>
</html>
