<!DOCTYPE html>
<html lang="en">
<!-- ===================================================================
     PRODUCTS / OFFER PAGE
     =================================================================== -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offer/Sale - Ironvow Shop</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="Game store logo.svg" type="image/svg+xml">
</head>
<body>
    <!-- HEADER: Navigation bar -->
    <header>
        <nav class="navbar">
            <div class="logo">
                <img src="Game store logo.svg" alt="Ironvow Shop Logo" class="img">
                <h2>Ironvow Shop</h2>
            </div>
            <ul class="nav-links">
                <li><a href="home.html">Home</a></li>
                <li><a href="products.html" class="active">Offer/Sale</a></li>
                <li><a href="cart.html">Cart</a></li>
                <li><a href="news.html">News</a></li>
                <li><a href="library.html">Library</a></li>
                <li><a href="myside.html">My Side</a></li>
                <li id="login-nav-item"><a href="index.html">Login</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="products-section">
            <!-- Page header -->
            <div class="products-header">
                <span>Ironvow Shop — Special Offers</span>
            </div>

            <!-- Promotional banner -->
            <div class="sale-banner">
                <p>🔥 Limited time deals — Save up to 70% on top games!</p>
            </div>

            <!-- SALE GAMES SECTION: Loaded from database -->
            <div class="section-label">SALE & OFFERS — UP TO 70% OFF</div>
            <!-- Empty grid - JavaScript fills this with sale game cards -->
            <div class="sale-grid" id="sale-grid">
                <p style="color: var(--text-secondary);">Loading deals...</p>
            </div>

        </section>
    </main>

    <footer>
        <p>&copy; 2026 Ironvow Shop. All rights reserved.</p>
    </footer>

    <!-- SCRIPT: Loads sale games from database with favourite and cart buttons -->
    <script>
        // Store user's favourited game IDs
        let userFavourites = [];

        // First load user favourites, then load sale games
        fetch('/api/favourites')
            .then(res => res.json())
            .then(data => {
                // If logged in store their favourited game IDs
                if (Array.isArray(data)) {
                    userFavourites = data.map(f => f.game_id);
                }
                // Now load sale games
                loadSaleGames();
            });

        function loadSaleGames() {
            // Fetch sale games from database
            fetch('/api/sale-games')
                .then(res => res.json())
                .then(games => {
                    const grid = document.getElementById('sale-grid');
                    grid.innerHTML = '';

                    if (!games || games.length === 0) {
                        grid.innerHTML = '<p style="color: var(--text-secondary);">No deals available right now.</p>';
                        return;
                    }

                    games.forEach(game => {
                        // Calculate discount percentage
                        const discount = Math.round((1 - game.sale_price / game.price) * 100);

                        // Check if this game is already favourited by user
                        const isFav = userFavourites.includes(game.id);
                        const heartIcon = isFav ? '♥' : '♡';

                        const card = document.createElement('div');
                        card.className = 'sale-item';
                        card.onclick = () => window.open(game.steam_url, '_blank');
                        card.innerHTML = `
                            <!-- Game cover image -->
                            <img class="game-img" src="${game.image_url}" alt="${game.title}">
                            <!-- Discount badge -->
                            <div style="position:relative;">
                                <span style="
                                    background: #e74c3c;
                                    color: white;
                                    padding: 2px 8px;
                                    border-radius: 4px;
                                    font-size: 0.8rem;
                                    font-weight: bold;
                                    margin: 0.5rem 1.2rem;
                                    display: inline-block;
                                ">-${discount}%</span>
                            </div>
                            <!-- Game title -->
                            <p class="game-name">${game.title}</p>
                            <!-- Original price crossed out and sale price -->
                            <div style="display:flex; align-items:center; gap:0.5rem; margin: 0 1.2rem 0.5rem 1.2rem;">
                                <span style="color: var(--text-secondary); text-decoration: line-through; font-size: 0.9rem;">$${parseFloat(game.price).toFixed(2)}</span>
                                <span class="sale-price">$${parseFloat(game.sale_price).toFixed(2)}</span>
                            </div>
                            <!-- Favourite and cart buttons -->
                            <div class="card-buttons">
                                <!-- Heart button - pink outline or filled depending on favourite status -->
                                <button class="fav-btn" id="fav-${game.id}" onclick="toggleFavourite(event, ${game.id})" title="Add to favourites" style="color:#ff69b4;">${heartIcon}</button>
                                <!-- Cart button -->
                                <button class="cart-btn" onclick="addToCart(event, ${game.id})" title="Add to cart">🛒</button>
                            </div>
                        `;
                        grid.appendChild(card);
                    });
                });
        }

        // Toggle favourite on or off for a game
        function toggleFavourite(event, gameId) {
            event.stopPropagation();
            fetch('/api/favourite', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ gameId })
            })
            .then(res => res.json())
            .then(data => {
                if (data.message === 'not logged in') {
                    alert('Please login to add favourites!');
                } else if (data.message === 'added') {
                    event.target.innerHTML = '♥';
                    event.target.style.color = '#ff69b4';
                    userFavourites.push(gameId);
                } else {
                    event.target.innerHTML = '♡';
                    event.target.style.color = '#ff69b4';
                    userFavourites = userFavourites.filter(id => id !== gameId);
                }
            });
        }

        // Add game to cart in database
        function addToCart(event, gameId) {
            event.stopPropagation();
            fetch('/api/cart', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ gameId })
            })
            .then(res => res.json())
            .then(data => {
                if (data.message === 'not logged in') {
                    alert('Please login to add to cart!');
                } else if (data.message === 'already in cart') {
                    alert('Already in your cart!');
                } else {
                    alert('Added to cart!');
                }
            });
        }

        // Hide login if logged in
        fetch('/api/session')
            .then(res => res.json())
            .then(data => {
                if (data.loggedIn) {
                    const loginItem = document.getElementById('login-nav-item');
                    if (loginItem) loginItem.style.display = 'none';
                }
            });
    </script>
</body>
</html>
